  var TODOS = [

  // ---- tema ----
  var mem={};
  var s; try{ s=localStorage.getItem("comii-theme"); }catch(e){ s=mem["comii-theme"]; }
  if(s==="dark" || (!s && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches)) document.documentElement.classList.add("dark");
  document.getElementById("themeBtn").addEventListener("click",function(){
    document.documentElement.classList.toggle("dark");
    var v=document.documentElement.classList.contains("dark")?"dark":"light";
    try{ localStorage.setItem("comii-theme",v); }catch(e){ mem["comii-theme"]=v; }
  });

  function esc(t){ var d=document.createElement("div"); d.textContent=t; return d.innerHTML; }
  function pad(n){ return (n<10?"0":"")+n; }

  // ---- render de módulos ----
  var main=document.getElementById("sections");
  var navHtml=[];
  var total=0;

  MODULES.forEach(function(mod){
    total += mod.terms.length;
    navHtml.push('<a href="#mod-'+mod.n+'">'+pad(mod.n)+' · '+esc(mod.nav)+'</a>');

    var sec=document.createElement("section");
    sec.className="mod"; sec.id="mod-"+mod.n;
    sec.innerHTML='<div class="mhead"><span class="mn">'+pad(mod.n)+'</span><h2>'+esc(mod.title)+'</h2>'+
                  '<span class="cnt">'+mod.terms.length+' siglas</span></div>';
    var list=document.createElement("div"); list.className="glist";
    mod.terms.forEach(function(t){
      var div=document.createElement("div"); div.className="term";
      div.setAttribute("data-search",(t.sig+" "+t.exp+" "+t.d).toLowerCase());
      div.innerHTML='<div class="sig">'+esc(t.sig)+'</div>'+
                    (t.exp && t.exp!=="—" ? '<div class="exp">'+esc(t.exp)+'</div>' : '')+
                    '<div class="desc">'+esc(t.d)+'</div>';
      list.appendChild(div);
    });
    sec.appendChild(list);
    main.appendChild(sec);
  });

  // ---- módulos pendientes ----
  if(TODOS.length){
    var pend=document.createElement("section");
    pend.className="mod"; pend.id="mod-next";
    pend.innerHTML='<div class="mhead"><span class="mn">'+TODOS[0].n+'–'+TODOS[TODOS.length-1].n+'</span>'+
                   '<h2>Módulos pendientes</h2></div>'+
                   '<div class="soon">Las siglas de estos módulos se agregan a medida que avancemos:<br><b>'+

    main.appendChild(pend);
  }

  document.getElementById("modnav").innerHTML=navHtml.join("");
  document.getElementById("totalcount").textContent=total+" siglas en "+MODULES.length+" módulos";

  // ---- buscador ----
  var q=document.getElementById("q");
  q.addEventListener("input",function(){
    var v=q.value.trim().toLowerCase();
    var shown=0;
    document.querySelectorAll("section.mod").forEach(function(sec){
      if(sec.id==="mod-next"){ sec.style.display=v?"none":""; return; }
      var vis=0;
      sec.querySelectorAll(".term").forEach(function(el){

      });
      sec.style.display=vis?"":"none";  // ocultar módulos sin coincidencias
    });

  });

</script>
