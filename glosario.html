<!DOCTYPE html>
<html lang="es">
<head>

<title>Glosario de siglas · Comunicaciones II</title>
<style>
  :root{
    --bg:#f5f7fa; --card:#ffffff; --text:#1b2531; --muted:#6a7685; --border:#e4e8ee;

  }

  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;font-size:16px;padding-bottom:env(safe-area-inset-bottom)}

  header{position:sticky;top:0;z-index:20;background:var(--card);border-bottom:1px solid var(--border);padding:11px 16px}
  .htop{display:flex;align-items:center;justify-content:space-between;gap:10px;max-width:860px;margin:0 auto}
  .htop h1{font-size:1.05rem;margin:0;font-weight:700;letter-spacing:-.01em}
  .htop span{font-size:.72rem;color:var(--muted)}
  .hbtns{display:flex;gap:8px;flex-shrink:0}
  .iconbtn{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:9px;padding:7px 10px;font-size:.75rem;font-weight:600;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center}

  .search{max-width:860px;margin:11px auto 0;position:relative}
  .search input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:11px 14px;font-size:.95rem;font-family:inherit}
  .search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

  main{max-width:860px;margin:0 auto;padding:16px}
  .modnav{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
  .modnav a{font-size:.74rem;font-weight:700;text-decoration:none;color:var(--accent);background:var(--accent-soft);border-radius:99px;padding:5px 11px}

  section.mod{margin-bottom:26px;scroll-margin-top:130px}
  .mhead{display:flex;align-items:center;gap:9px;margin:0 2px 10px;padding-bottom:7px;border-bottom:2px solid var(--border)}
  .mhead .mn{flex:none;width:28px;height:28px;border-radius:8px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.82rem;font-family:ui-monospace,Menlo,monospace}
  .mhead h2{margin:0;font-size:1rem;font-weight:700}
  .mhead .cnt{margin-left:auto;font-size:.72rem;color:var(--muted);font-weight:600}

  .glist{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  @media(max-width:640px){.glist{grid-template-columns:1fr}}
  .term{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 13px;box-shadow:var(--shadow)}
  .term .sig{font-weight:800;color:var(--accent);font-family:ui-monospace,Menlo,monospace;font-size:.9rem}
  .term .exp{font-weight:600;font-size:.86rem;margin:1px 0 3px}
  .term .desc{font-size:.82rem;color:var(--muted);line-height:1.45}
  .totalcount{font-size:.74rem;color:var(--muted);margin:0 4px 16px;font-weight:600}
  .empty{display:none;text-align:center;color:var(--muted);padding:40px 20px;font-size:.9rem}

  .soon{background:var(--card);border:1px dashed var(--border);border-radius:10px;padding:14px;color:var(--muted);font-size:.86rem;text-align:center}

  footer{max-width:860px;margin:20px auto 34px;padding:0 16px;font-size:.72rem;color:var(--muted)}
</style>
</head>

<main>
  <nav class="modnav" id="modnav"></nav>
  <p class="totalcount" id="totalcount"></p>

  <div id="sections"></div>

</main>

<footer>Buscá por sigla o por palabra del significado. Volvé al <a href="index.html" style="color:var(--accent)">Centro de estudio</a>.</footer>

<script>
(function(){
  "use strict";

  // ---- Datos: un objeto por módulo. Para sumar el módulo N, agregá su entrada acá. ----
  var MODULES = [
    { n:1, slug:"01-intro-wan", nav:"Intro WAN", title:"Introducción a redes WAN", terms:[
      {sig:"WAN", exp:"Wide Area Network", d:"Red de área extensa: interconecta LANs y dispositivos a grandes distancias mediante conmutación."},
      {sig:"LAN", exp:"Local Area Network", d:"Red de área local, dentro de un edificio o campus."},

      {sig:"CSU/DSU", exp:"Channel Service Unit / Data Service Unit", d:"Adapta la interfaz del equipo digital a la línea del proveedor."},

      {sig:"ISP", exp:"Internet Service Provider", d:"Proveedor de acceso a Internet."},

      {sig:"PoP", exp:"Point of Presence", d:"Instalación física del proveedor donde el usuario se conecta a la red / Internet."},
      {sig:"PoD", exp:"Point of Delivery", d:"Módulo autónomo dentro de un datacenter (cómputo+almacenamiento+red+energía)."},
      {sig:"IXP", exp:"Internet Exchange Point", d:"Punto neutral donde ISPs intercambian tráfico local; evita el tromboning."},

      {sig:"PRI", exp:"Primary Rate Interface", d:"ISDN primario: 30 canales B de 64 kbps + 1 canal D de 64 kbps."},
      {sig:"DSL", exp:"Digital Subscriber Line", d:"Datos sobre el par de cobre telefónico (voz baja frecuencia, datos alta)."},
      {sig:"ADSL", exp:"Asymmetric DSL", d:"DSL asimétrica: más velocidad de bajada que de subida."},
      {sig:"SDSL", exp:"Symmetric DSL", d:"DSL con velocidades simétricas de subida y bajada."},
      {sig:"VDSL", exp:"Very high bit-rate DSL", d:"DSL de alta velocidad a corta distancia."},
      {sig:"DSLAM", exp:"DSL Access Multiplexer", d:"Equipo en la central que concentra las líneas DSL de los abonados."},
      {sig:"HFC", exp:"Hybrid Fibre-Coaxial", d:"Arquitectura de cable: fibra hasta el barrio, coaxial el último tramo."},
      {sig:"VSAT", exp:"Very Small Aperture Terminal", d:"Terminal satelital de antena pequeña para acceso en sitios remotos."},
      {sig:"WiMAX", exp:"Worldwide Interoperability for Microwave Access", d:"Acceso inalámbrico metropolitano (IEEE 802.16), hasta ~50 km."},
      {sig:"WiFi", exp:"Wireless Fidelity", d:"Acceso local inalámbrico (interiores)."},
      {sig:"VPN", exp:"Virtual Private Network", d:"Red privada sobre infraestructura pública; acceso remoto o sitio-a-sitio."},
      {sig:"IPsec", exp:"Internet Protocol Security", d:"Estándar de tunelización con cifrado fuerte para VPN."},
      {sig:"SSL/TLS", exp:"Secure Sockets Layer / Transport Layer Security", d:"Cifrado para VPN por navegador y comunicaciones seguras."},
      {sig:"QoS", exp:"Quality of Service", d:"Priorización de tráfico (voz, video) para garantizar rendimiento."},
      {sig:"SLA", exp:"Service Level Agreement", d:"Acuerdo de nivel de servicio con el proveedor."},
      {sig:"VoIP", exp:"Voice over IP", d:"Voz digitalizada transportada en paquetes IP."},
      {sig:"VoD", exp:"Video on Demand", d:"Video bajo demanda, apoyado en CDNs."},
      {sig:"E1", exp:"Enlace europeo (UIT-T)", d:"Línea de 2.048 Mbps (32 canales de 64 kbps)."},
      {sig:"T1", exp:"Enlace norteamericano", d:"Línea de 1.544 Mbps (24 canales de 64 kbps)."},
      {sig:"V.35", exp:"Estándar UIT-T (capa física)", d:"Interfaz de alta velocidad (≤2 Mbps) entre DTE y DCE."},
      {sig:"X.21", exp:"Estándar UIT-T (capa física)", d:"Interfaz para enlaces WAN digitales sincronizados DTE–DCE."},
      {sig:"EIA/TIA", exp:"Electronic/Telecommunications Industries Association", d:"Estándares de interfaz serial (232, 449) en la capa física."},
      {sig:"HDLC", exp:"High-Level Data Link Control", d:"Protocolo base de capa de enlace."},
      {sig:"PPP", exp:"Point-to-Point Protocol", d:"Protocolo de enlace para conexiones punto a punto."},
      {sig:"IP", exp:"Internet Protocol", d:"Protocolo de red que direcciona y encamina paquetes (módulo 6)."},
      {sig:"IPv4 / IPv6", exp:"Internet Protocol v4 / v6", d:"Versiones de IP: 32 bits (v4) y 128 bits (v6)."},
      {sig:"BGP", exp:"Border Gateway Protocol", d:"Protocolo de ruteo entre sistemas autónomos en Internet (módulo 7)."},
      {sig:"DNS", exp:"Domain Name System", d:"Traduce nombres de dominio a direcciones IP (módulo 9)."}

    { n:2, slug:"02-ultima-milla", nav:"Última milla", title:"Acceso de usuario: la última milla", terms:[

      {sig:"POTS", exp:"Plain Old Telephone Service", d:"Servicio telefónico analógico clásico. En ADSL ocupa los 25 KHz inferiores; en VDSL, 0–4 KHz."},

      {sig:"DMT", exp:"Discrete MultiTone", d:"Divide la banda en subcanales de 4 KHz, mide S/N de cada uno y asigna más bits a los mejores."},
      {sig:"FDM", exp:"Frequency Division Multiplexing", d:"Multiplexación por división de frecuencia: cada señal viaja en una banda distinta. Base de ADSL."},

      {sig:"PSK", exp:"Phase Shift Keying", d:"Modulación por desplazamiento de fase; alternativa a QAM en DMT."},
      {sig:"CAP", exp:"Carrierless Amplitude/Phase", d:"Codificación de línea; en la tabla xDSL, ADSL figura como CAP/DMT."},
      {sig:"2B1Q", exp:"2 Binary 1 Quaternary", d:"Codificación de línea de las xDSL simétricas (HDSL, SDSL, G.SHDSL). 4 bits por ciclo."},
      {sig:"S/N (SNR)", exp:"Relación señal a ruido", d:"Mide la calidad de un subcanal. Decrece al subir la frecuencia por mayor atenuación."},
      {sig:"UTP", exp:"Unshielded Twisted Pair", d:"Par trenzado sin blindaje. ADSL aprovecha 1 MHz de su ancho de banda."},
      {sig:"SDH", exp:"Synchronous Digital Hierarchy", d:"Red de transporte de capa 1. También soporta servicios EPL de Metro Ethernet."},
      {sig:"OTH", exp:"Optical Transport Hierarchy", d:"Redes ópticas transparentes; tecnología de transporte de capa 1."},
      {sig:"TDM", exp:"Time Division Multiplexing", d:"Multiplexación por división de tiempo. EPL se describe como una línea TDM con interfaz Ethernet."},
      {sig:"PLC", exp:"Power Line Communications", d:"Acceso fijo a través de la red eléctrica."},
      {sig:"FTTx", exp:"Fiber To The x", d:"Familia de arquitecturas de fibra según cuán cerca llega del domicilio."},
      {sig:"FTTH", exp:"Fiber To The Home", d:"Fibra hasta el hogar."},
      {sig:"FTTB", exp:"Fiber To The Building", d:"Fibra hasta el edificio."},

      {sig:"EPON", exp:"Ethernet Passive Optical Network", d:"Permite compartir entre varios abonados los costes de terminaciones de red."},
      {sig:"GPON", exp:"Gigabit PON", d:"Estándar PON: 1,2 Gbps de subida y 2,5 Gbps de bajada."},
      {sig:"XG-PON", exp:"10 Gigabit PON", d:"Estándar PON: 2,5/10 Gbps de subida y 10 Gbps de bajada."},
      {sig:"XGS-PON", exp:"Symmetric XG-PON", d:"Estándar PON simétrico: 10 Gbps en ambos sentidos."},
      {sig:"NG-PON2", exp:"Next-Generation PON2", d:"Estándar PON: 40 Gbps en ambos sentidos."},
      {sig:"OLT", exp:"Optical Line Terminal", d:"Equipo en la central del proveedor donde arranca la fibra PON."},
      {sig:"ONT", exp:"Optical Network Terminal", d:"Equipo óptico en el domicilio del cliente."},
      {sig:"ONU", exp:"Optical Network Unit", d:"Unidad óptica del lado del usuario cuando termina en un punto intermedio."},
      {sig:"ODN", exp:"Optical Distribution Network", d:"Red de distribución óptica: los splitters pasivos entre el OLT y los abonados."},
      {sig:"CATV", exp:"Community Antenna Television", d:"Televisión por cable; uso típico de las redes HFC."},
      {sig:"DOCSIS", exp:"Data Over Cable Service Interface Specification", d:"Estándar de datos sobre cable. El módulo cita un router Cisco con DOCSIS 3.0."},
      {sig:"EFM", exp:"Ethernet in the First Mile", d:"Ethernet en la primera milla. Estandarizada por IEEE 802.3ah (no 802.3ab)."},
      {sig:"MEF", exp:"Metro Ethernet Forum", d:"Organismo que define los tipos de EVC: E-Line, E-LAN y E-Tree."},
      {sig:"EVC", exp:"Ethernet Virtual Connection", d:"Conecta dos o más UNIs y aísla a quienes no son del mismo EVC. Similar a un PVC ATM."},
      {sig:"UNI", exp:"User Network Interface", d:"Punto de interfaz entre el cliente y la red del proveedor en Metro Ethernet."},
      {sig:"E-Line", exp:"Ethernet Line Service", d:"EVC punto a punto."},
      {sig:"E-LAN", exp:"Ethernet LAN Service", d:"EVC multipunto."},
      {sig:"E-Tree", exp:"Ethernet Tree Service", d:"EVC punto a multipunto."},
      {sig:"EPL", exp:"Ethernet Private Line", d:"E-Line con ancho de banda dedicado; el cliente siempre dispone del CIR. Sobre SDH o MPLS."},

      {sig:"EPLan", exp:"Ethernet Private LAN", d:"E-LAN multipunto entre dos o más UNIs con ancho de banda dedicado."},
      {sig:"EVPLan", exp:"Ethernet Virtual Private LAN", d:"E-LAN virtual; también llamada VPLS, TLS o VPSN. El servicio más rentable para el proveedor."},
      {sig:"VPLS", exp:"Virtual Private LAN Service", d:"Otro nombre de EVPLan."},

      {sig:"VPSN", exp:"Virtual Private Switched Network", d:"Otro nombre de EVPLan."},

      {sig:"LMDS", exp:"Local Multipoint Distribution Service", d:"Bucle inalámbrico en la banda de 26–28 GHz."},
      {sig:"MMDS", exp:"Multichannel Multipoint Video Distribution System", d:"Bucle inalámbrico; genérico en la banda de 40 GHz."},

      {sig:"UMTS", exp:"Universal Mobile Telecommunications System", d:"Tecnología de comunicaciones móviles de tercera generación."},

      {sig:"OpenVPN", exp:"—", d:"Implementación de VPN usada en el TP (modo roadwarrior). Config del cliente en el archivo .ovpn."},
      {sig:"SOCKS", exp:"Socket Secure", d:"Proxy dinámico; se levanta con ssh -D 9999 -C."}

  ];

    {n:3,  title:"Multiplexión"},

    {n:7,  title:"Protocolos de ruteo"},

  // ---- tema ----
  var mem={};
  var s; try{ s=localStorage.getItem("comii-theme"); }catch(e){ s=mem["comii-theme"]; }

  function esc(t){ var d=document.createElement("div"); d.textContent=t; return d.innerHTML; }

  // ---- render de módulos ----
  var main=document.getElementById("sections");
  var navHtml=[];
  var total=0;

  MODULES.forEach(function(mod){
    total += mod.terms.length;

    sec.className="mod"; sec.id="mod-"+mod.n;

                   '<h2>Módulos pendientes</h2></div>'+
                   '<div class="soon">Las siglas de estos módulos se agregan a medida que avancemos:<br><b>'+
                   TODOS.map(function(t){return pad(t.n)+" "+esc(t.title);}).join(" · ")+'</b></div>';
    main.appendChild(pend);
  }

  document.getElementById("modnav").innerHTML=navHtml.join("");
  document.getElementById("totalcount").textContent=total+" siglas en "+MODULES.length+" módulos";

  // ---- buscador ----
  var q=document.getElementById("q");
  q.addEventListener("input",function(){
    var v=q.value.trim().toLowerCase();
    var shown=0;
    document.querySelectorAll("section.mod").forEach(function(sec){
      if(sec.id==="mod-next"){ sec.style.display=v?"none":""; return; }
      var vis=0;
      sec.querySelectorAll(".term").forEach(function(el){
        var match=!v || el.getAttribute("data-search").indexOf(v)>-1;
        el.style.display=match?"":"none"; if(match){ vis++; shown++; }
      });
      sec.style.display=vis?"":"none";  // ocultar módulos sin coincidencias
    });
    document.getElementById("empty").style.display=(v && shown===0)?"block":"none";
  });
})();
</script>
</body>
</html>
